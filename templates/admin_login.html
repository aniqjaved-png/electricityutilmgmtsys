{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full text-3xl mb-4">🔐</div>
    <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
    <p class="text-gray-500 text-sm mt-1">Enter the admin password to continue</p>
  </div>
  <form method="POST" class="card space-y-4">
    <div>
      <label class="form-label">Password</label>
      <input name="password" type="password" required autofocus class="form-input" placeholder="••••••••">
    </div>
    <button type="submit" class="btn-primary w-full">Sign In</button>
  </form>
  <p class="text-center text-sm text-gray-400 mt-4">Default password: <code class="bg-gray-100 px-1 rounded">admin123</code></p>
</div>
{% endblock %}
