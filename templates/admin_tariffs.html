{% extends "admin_base.html" %}
{% block title %}Tariffs — Admin{% endblock %}
{% block page_title %}Tariffs{% endblock %}
{% block content %}
<div class="grid md:grid-cols-2 gap-4">
  {% for t in rows %}
  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold text-gray-800">{{ t.Connection_Type_Name }}</h2>
      <span class="text-xs text-gray-400">Tariff #{{ t.Tariff_Id }}</span>
    </div>
    <form method="POST" action="/admin/tariffs/update/{{ t.Tariff_Id }}" class="space-y-3">
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="form-label">Unit Rate (PKR/kWh)</label>
          <input name="unit_rate" type="number" step="0.01" value="{{ t.Unit_Rate }}" required class="form-input">
        </div>
        <div>
          <label class="form-label">Fixed Charges (PKR)</label>
          <input name="fixed_charges" type="number" step="0.01" value="{{ t.Fixed_Charges }}" required class="form-input">
        </div>
        <div>
          <label class="form-label">Tax (%)</label>
          <input name="tax_percentage" type="number" step="0.01" value="{{ t.Tax_Percentage }}" required class="form-input">
        </div>
      </div>
      <button type="submit" class="btn-primary text-sm">Update Tariff</button>
    </form>
  </div>
  {% endfor %}
</div>
{% endblock %}
